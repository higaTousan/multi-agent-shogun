    - why3: "手動実行環境とlaunchd環境の差分検証を計画に含めていなかった"
    - why4: "互換性要件（3.9互換）を実装前チェックリストへ固定できていなかった"

  detection: |
    cmd_295の調査で .periodic_analysis.log の型構文エラーを確認して発覚した。

  resolution: |
    3.9互換の型記法へ修正し、launchd実行系での構文互換を再確認。
