  summary: "WIX移行時の内部メモ10件が本番サイトのユーザー向けテキストとして露出した。"

  impact: |
    - 本番ユーザーに開発者向け内部メモが表示された
    - サイト品質と信頼性を損なうリスクが生じた
    - 3/20ロンチ前の緊急確認と手戻り対応が発生した（10ファイル対象）

  trigger: |
    app/menu/page.tsx・app/profile/episodes/page.tsx・app/menu/cancel-policy/page.tsx・
    app/profile/page.tsx・app/event/page.tsx・app/counselor/page.tsx・
