    - why4: "軍師のクロスチェック工程に『不可判定の独立再検証』が組み込まれていなかった"

  detection: |
    殿がOpenRouter上の現行ID deepseek/deepseek-v3.2 を直接確認して発見した。
    エージェント側では自律検知できていなかった。

  resolution: |
