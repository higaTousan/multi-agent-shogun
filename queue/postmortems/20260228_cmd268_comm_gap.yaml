postmortem:
  id: "PM-2026-005"
  timestamp: "2026-02-28T00:00:00"
  cmd_id: "cmd_268"
  subtask_id: ""
  recorded_by: "karo"
  severity: "medium"
  category: "comm_gap"
  tags: ["why", "acceptance_criteria", "task_yaml"]
  status: "active"
  resolved_by: ""
  title: "WHYが足軽タスクYAMLに伝わらず、目的不明のまま作業完了"
  what_happened: |
    殿→将軍→家老→足軽と指示が伝達される過程で「なぜやるか（WHY）」が消え、
    「何をやるか（WHAT）」だけ残った。足軽はファイル生成を完了と判断したが、
    殿が期待した品質比較・目的達成確認は実施されなかった。
  why_not_detected: |
    QCでは「成果物が存在するか」のみ判定し、「殿の目的を達成しているか」を検証しなかった。
    足軽タスクYAMLにparent_cmdのWHYが記載されておらず、判定基準が不明確だった。
  root_causes:
    - why1: "タスクYAMLのacceptance_criteriaが「ファイルが存在すること」のみで目的達成条件がなかった"
    - why2: "各層の伝達で「目的」が「手順」に変質し、WHYが省略された"
    - why3: "QC判定基準が「成果物の存在」であり「目的の達成」ではなかった"
  systemic_improvements:
    - "足軽タスクYAMLにparent_cmd purposeフィールドを必須化"
    - "acceptance_criteriaにWHY達成条件を必ず含める（ファイル存在のみ不可）"
    - "QC判定を「殿の目的を達成しているか」ベースに変更"
  lessons:
    - "QC開始時にタスクYAMLのacceptance_criteriaとparent_cmd purposeを照合せよ"
    - "acceptance_criteriaが『ファイルが存在すること』のみなら、WHYが消失している証拠"
