postmortem:
  id: "PM-2026-005"
  timestamp: "2026-02-28T00:00:00"
  cmd_id: "cmd_268"
  subtask_id: ""
  recorded_by: "karo"
  severity: "medium"
  category: "comm_gap"
  tags: ["why", "acceptance_criteria", "task_yaml"]
  status: "active"
  resolved_by: "shogun"

  summary: "伝達過程でWHYが消失し、足軽が『ファイル生成』のみを完了条件と誤解した。"

  impact: |
    - 殿の期待（目的達成確認）と成果物評価が乖離
    - 追加レビューと手戻りが発生
    - タスク定義品質が組織的リスクとして顕在化

  trigger: |
    タスクYAMLのacceptance_criteriaにWHY達成条件が含まれなかった。

  root_causes:
    - why1: "acceptance_criteriaが成果物存在のみで、目的達成の検証条件を欠いていた"
    - why2: "殿→将軍→家老→足軽の伝達でWHYが段階的に省略された"
    - why3: "QCが『成果物の有無』中心で『目的達成』を判定していなかった"
    - why4: "parent_cmd purposeの照合手順が標準プロセスとして固定化されていなかった"

  detection: |
    殿が成果物を確認した際に、期待した目的と一致しないことを発見した。

  resolution: |
    タスク記述ルールを見直し、purpose連携とWHY達成条件を明示する運用へ移行。
    QCでpurpose照合を必須化する方針を設定した。

  action_items:
    prevent:
      - action: "作業指示には必ず目的（WHY）を含めよ。WHATだけの指示は禁止"
        owner: "karo"
        status: "TODO"
    mitigate:
      - action: "目的が不明確な指示を受けたら、着手前に確認せよ"
        owner: "ashigaru"
        status: "TODO"
    process:
      - action: "成果物の検証は、作業完了ではなく目的達成で判定せよ"
        owner: "gunshi"
        status: "TODO"

  lessons_learned:
    well:
      - "殿レビューで期待との乖離を早期に止められた"
    wrong:
      - "WHATのみでタスクを定義し、WHYを検証条件に落とし込めなかった"
    lucky:
      - "最終納品前に殿が確認したため、誤方向のまま固定化を回避できた"
